name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Validar datos incluidos
        run: python scripts/validate_public.py
      - name: Tests
        run: python -m pytest -q tests/
      - name: Verificación anti-contaminación
        run: python scripts/public_clean_check.py
